[terminal]

osc52 = "CopyPaste"


[terminal.shell]
program = "C:\\Windows\\System32\\wsl.exe"

[font]

normal.family = "Go Mono"

size = 13.0

[font.offset]

x = -1
y = -2

[mouse]

# suspect this is affecting other things?
hide_when_typing = true

[window]

padding.x=8
padding.y=8

# give control-backspace -> delete word
[[keyboard.bindings]]
key = "Back"
mods = "Control"
chars = "\u001b\u007f"

# Colors (Alabaster)
# author tonsky

[colors.primary]
background = '#e7e7e7'
foreground = '#434343'

[colors.cursor]
text = '#F7F7F7'
cursor = '#434343'

[colors.normal]
black = '#000000'
red = '#AA3731'
green = '#448C27'
yellow = '#CB9000'
blue = '#325CC0'
magenta = '#7A3E9D'
cyan = '#0083B2'
white = '#BBBBBB'

[colors.bright]
black = '#777777'
red = '#F05050'
green = '#60CB00'
yellow = '#FFBC5D'
blue = '#007ACC'
magenta = '#E64CE6'
cyan = '#00AACB'
white = '#FFFFFF'
